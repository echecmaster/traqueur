<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulle Interactive - Suivi Continu</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Cadre de la caméra miniature, placé discrètement dans le coin supérieur droit */
        .camera-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            opacity: 0.6;
            transition: opacity 0.3s ease, border-color 0.3s ease;
        }
        .camera-container:hover {
            opacity: 1;
            border-color: #00ffcc;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Effet miroir */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* LA BULLE INTERACTIVE */
        #bubble {
            position: fixed;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(0, 255, 204, 0.3) 40%, rgba(0, 128, 255, 0.6) 80%);
            box-shadow: 
                0 0 20px rgba(0, 255, 204, 0.4), 
                inset 0 0 20px rgba(255, 255, 255, 0.6),
                inset -10px -10px 25px rgba(0, 0, 0, 0.3);
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none; /* Le clic passe à travers pour être capturé par le JS */
            transition: transform 0.1s ease, filter 0.2s ease;
            will-change: left, top;
        }
        /* Style spécial quand on survole la bulle */
        #bubble.hovered {
            filter: brightness(1.2) drop-shadow(0 0 15px rgba(0, 255, 204, 0.8));
            transform: translate(-50%, -50%) scale(1.08);
        }
        /* Style spécial quand on attrape la bulle */
        #bubble.grabbed {
            filter: brightness(1.3) drop-shadow(0 0 25px #ff0055);
            transform: translate(-50%, -50%) scale(0.95);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7), rgba(255, 0, 100, 0.3) 40%, rgba(150, 0, 255, 0.7) 80%);
            box-shadow: 
                0 0 30px rgba(255, 0, 100, 0.6), 
                inset 0 0 20px rgba(255, 255, 255, 0.8),
                inset -10px -10px 25px rgba(0, 0, 0, 0.3);
        }

        /* LE CURSEUR VIRTUEL - Toujours visible par défaut */
        #virtual-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            background-color: #00ffff;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2147483647; /* Toujours au premier plan absolu */
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            will-change: left, top;
            opacity: 0.5; /* Semi-transparent quand inactif / en recherche de main */
            transition: opacity 0.2s ease, background-color 0.1s, box-shadow 0.1s;
        }
        /* Style actif dès qu'une main est détectée */
        #virtual-cursor.active {
            opacity: 1;
        }
        /* Style de clic */
        #virtual-cursor.clicking {
            background-color: #ff0055;
            box-shadow: 0 0 25px #ff0055, 0 0 50px #ff0055;
            transform: translate(-50%, -50%) scale(0.7);
        }

        /* Indicateur de chargement initial */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 300;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Indicateur d'initialisation -->
    <div id="loading">Initialisation de la caméra et de l'IA...</div>

    <!-- Fenêtre caméra miniature de suivi -->
    <div class="camera-container">
        <video id="webcam" style="display:none;" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <!-- La Bulle Interactive -->
    <div id="bubble"></div>

    <!-- Le Curseur Virtuel (initialement centré sur l'écran) -->
    <div id="virtual-cursor" style="left: 50%; top: 50%;"></div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingDiv = document.getElementById('loading');
        const virtualCursor = document.getElementById('virtual-cursor');
        const bubble = document.getElementById('bubble');

        // Position de départ du curseur (au centre de la page)
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        let isClicking = false;

        // Configuration de la bulle (Position et Vélocité)
        const bubbleRadius = 50; 
        let bubbleX = window.innerWidth / 2;
        let bubbleY = window.innerHeight / 2;
        
        // Vitesse initiale pour la dérive de la bulle
        let bubbleVx = (Math.random() - 0.5) * 4;
        let bubbleVy = (Math.random() - 0.5) * 4;
        let isDragged = false;

        // Variables pour conserver l'inertie lors du lâcher
        let lastBubbleX = bubbleX;
        let lastBubbleY = bubbleY;

        // Ajustement de la taille du canvas de rendu
        videoElement.addEventListener('loadedmetadata', () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
        });

        // Calcul de la distance 2D entre deux points
        function getDistance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        // --- RETOUR REÇU DE L'IA (MEDIASPIPE) ---
        function onResults(results) {
            if (loadingDiv) {
                loadingDiv.style.opacity = '0';
                setTimeout(() => loadingDiv.remove(), 300);
            }

            // Dessin du flux vidéo inversé sur la miniature
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                // Tracé du squelette de la main sur la miniature
                canvasCtx.strokeStyle = "#00FFCC"; 
                canvasCtx.lineWidth = 4;
                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
                    [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], 
                    [15, 16], [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]
                ];
                for (const connection of connections) {
                    const pt1 = landmarks[connection[0]];
                    const pt2 = landmarks[connection[1]];
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt1.x * canvasElement.width, pt1.y * canvasElement.height);
                    canvasCtx.lineTo(pt2.x * canvasElement.width, pt2.y * canvasElement.height);
                    canvasCtx.stroke();
                }

                // Activation visuelle du curseur (opacité à 100%)
                virtualCursor.classList.add('active');

                const thumbTip = landmarks[4];  // Bout du pouce
                const indexTip = landmarks[8];  // Bout de l'index

                // --- SUIVI PERMANENT DE L'INDEX ---
                // Le curseur suit TOUJOURS l'index sans restriction de geste.
                const rawX = 1 - indexTip.x; 
                const rawY = indexTip.y;

                // Zone centrale de l'appareil photo projetée sur 100% de la fenêtre active
                const minX = 0.25; 
                const maxX = 0.75;
                const minY = 0.25;
                const maxY = 0.70;

                let screenX = ((rawX - minX) / (maxX - minX)) * window.innerWidth;
                let screenY = ((rawY - minY) / (maxY - minY)) * window.innerHeight;

                // Clamping aux limites physiques de la fenêtre
                const margin = 15;
                cursorX = Math.max(margin, Math.min(screenX, window.innerWidth - margin));
                cursorY = Math.max(margin, Math.min(screenY, window.innerHeight - margin));

                // Application immédiate de la position
                virtualCursor.style.left = `${cursorX}px`;
                virtualCursor.style.top = `${cursorY}px`;

                // --- DÉTECTION DU PINCEMENT (CLIC) ---
                // Mesure physique de l'espace pouce-index
                const pinchDistance = getDistance(thumbTip, indexTip);
                const isPinching = pinchDistance < 0.048; // Seuil de tolérance du clic

                // Mesure de la distance entre le curseur virtuel et la bulle physique
                const distanceToBubble = Math.hypot(cursorX - bubbleX, cursorY - bubbleY);
                const isHovering = distanceToBubble < bubbleRadius;

                // Gestion de la mise en surbrillance de la bulle
                if (isHovering && !isDragged) {
                    bubble.classList.add('hovered');
                } else if (!isDragged) {
                    bubble.classList.remove('hovered');
                }

                if (isPinching) {
                    if (!isClicking) {
                        isClicking = true;
                        virtualCursor.classList.add('clicking');
                        
                        // Si le clic se produit lors du survol, on agrippe la bulle
                        if (isHovering) {
                            isDragged = true;
                            bubble.classList.add('grabbed');
                            bubble.classList.remove('hovered');
                        }
                    }
                } else {
                    isClicking = false;
                    virtualCursor.classList.remove('clicking');
                    
                    // Relâchement de la bulle
                    if (isDragged) {
                        isDragged = false;
                        bubble.classList.remove('grabbed');
                        
                        // Propulsion : transmet l'élan du geste de lancer à la bulle
                        bubbleVx = (bubbleX - lastBubbleX) * 0.8;
                        bubbleVy = (bubbleY - lastBubbleY) * 0.8;
                        
                        // Vitesse maximum autorisée au lancer pour éviter de perdre la bulle
                        const maxReleaseSpeed = 16;
                        const currentSpeed = Math.hypot(bubbleVx, bubbleVy);
                        if (currentSpeed > maxReleaseSpeed) {
                            bubbleVx = (bubbleVx / currentSpeed) * maxReleaseSpeed;
                            bubbleVy = (bubbleVy / currentSpeed) * maxReleaseSpeed;
                        }
                    }
                }

            } else {
                // Si aucune main n'est visible dans le flux :
                // On passe le curseur en basse opacité (0.5), mais il reste visible là où il était.
                virtualCursor.classList.remove('active');
                releaseBubbleSoftly();
            }
        }

        // Relâchement sécurisé de la bulle si la main quitte l'écran brusquement
        function releaseBubbleSoftly() {
            if (isDragged) {
                isDragged = false;
                bubble.classList.remove('grabbed');
                bubbleVx = (bubbleX - lastBubbleX) * 0.5;
                bubbleVy = (bubbleY - lastBubbleY) * 0.5;
            }
            bubble.classList.remove('hovered');
        }

        // --- ENTRAINEMENT DE LA PHYSIQUE DE LA BULLE (BOUCLE DE RENDU 60FPS) ---
        function updatePhysics() {
            if (isDragged) {
                // Stockage des anciennes positions pour l'évaluation de l'inertie de lancer
                lastBubbleX = bubbleX;
                lastBubbleY = bubbleY;

                // La bulle suit instantanément le curseur virtuel de l'index
                bubbleX = cursorX;
                bubbleY = cursorY;
            } else {
                // Dérive naturelle lente de la bulle
                bubbleVx += (Math.random() - 0.5) * 0.25;
                bubbleVy += (Math.random() - 0.5) * 0.25;

                // Résistance de l'air pour amortir les vitesses folles
                bubbleVx *= 0.985;
                bubbleVy *= 0.985;

                // Vitesse minimale pour préserver le mouvement perpétuel
                const minSpeed = 0.6;
                const currentSpeed = Math.hypot(bubbleVx, bubbleVy);
                if (currentSpeed < minSpeed) {
                    const angle = Math.random() * Math.PI * 2;
                    bubbleVx = Math.cos(angle) * minSpeed;
                    bubbleVy = Math.sin(angle) * minSpeed;
                }

                // Application du mouvement
                bubbleX += bubbleVx;
                bubbleY += bubbleVy;

                // Rebondissements élastiques avec perte d'énergie sur les limites de l'écran
                const leftBoundary = bubbleRadius;
                const rightBoundary = window.innerWidth - bubbleRadius;
                const topBoundary = bubbleRadius;
                const bottomBoundary = window.innerHeight - bubbleRadius;

                if (bubbleX < leftBoundary) {
                    bubbleX = leftBoundary;
                    bubbleVx = -bubbleVx * 0.8;
                } else if (bubbleX > rightBoundary) {
                    bubbleX = rightBoundary;
                    bubbleVx = -bubbleVx * 0.8;
                }

                if (bubbleY < topBoundary) {
                    bubbleY = topBoundary;
                    bubbleVy = -bubbleVy * 0.8;
                } else if (bubbleY > bottomBoundary) {
                    bubbleY = bottomBoundary;
                    bubbleVy = -bubbleVy * 0.8;
                }
            }

            // Positionnement physique de la bulle sur la page
            bubble.style.left = `${bubbleX}px`;
            bubble.style.top = `${bubbleY}px`;

            requestAnimationFrame(updatePhysics);
        }

        // Lancement immédiat de la physique de la bulle
        updatePhysics();

        // Réalignement si la fenêtre est redimensionnée
        window.addEventListener('resize', () => {
            bubbleX = Math.max(bubbleRadius, Math.min(bubbleX, window.innerWidth - bubbleRadius));
            bubbleY = Math.max(bubbleRadius, Math.min(bubbleY, window.innerHeight - bubbleRadius));
        });

        // --- DÉMARRAGE DE L'IA MEDIAPIPE ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.60, // Légère baisse pour stabiliser la détection pendant le pincement
            minTrackingConfidence: 0.60
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start().catch(err => {
            console.error(err);
            loadingDiv.innerText = "Erreur de caméra. Veuillez l'autoriser dans votre navigateur.";
            loadingDiv.style.color = "#ff4444";
        });
    </script>
</body>
</html>
