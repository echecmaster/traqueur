<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physique 2D Interactive - Empilement Stable</title>
    <!-- Bibliothèques d'IA MediaPipe : Caméra et Mains -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Canvas principal pour la simulation physique */
        #physics-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
        }

        /* Cadre de la caméra miniature en haut à droite */
        .camera-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            height: 135px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            opacity: 0.7;
            transition: opacity 0.3s ease, border-color 0.3s ease;
        }
        .camera-container:hover {
            opacity: 1;
            border-color: #00ffcc;
        }
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Effet miroir */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Guide d'utilisation en haut à gauche */
        #user-guide {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            max-width: 320px;
            font-size: 0.9rem;
            line-height: 1.4;
            pointer-events: none;
        }
        .guide-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .guide-item:last-child {
            margin-bottom: 0;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .dot-blue { background-color: #3399ff; box-shadow: 0 0 8px #3399ff; }
        .dot-red { background-color: #ff3366; box-shadow: 0 0 8px #ff3366; }

        /* L'UNIQUE CURSEUR VIRTUEL - Piloté par l'index GAUCHE, cliqué par la main DROITE */
        #virtual-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2147483647;
            transform: translate(-50%, -50%);
            will-change: left, top;
            background-color: #d946ef;
            box-shadow: 0 0 15px #d946ef, 0 0 30px #d946ef;
            opacity: 0.3; /* Semi-transparent si la main gauche de mouvement n'est pas détectée */
            transition: opacity 0.2s ease, transform 0.1s ease, background-color 0.1s;
        }
        #virtual-cursor.active {
            opacity: 1;
        }
        #virtual-cursor.clicking {
            background-color: #ec4899;
            box-shadow: 0 0 25px #ec4899, 0 0 50px #ec4899;
            transform: translate(-50%, -50%) scale(0.7);
        }

        /* Indicateur de chargement initial */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 300;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            padding: 25px 40px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="loading">
        Initialisation de la détection physique double main...<br>
        <span style="font-size: 0.9rem; color: #aaa;">Veuillez autoriser l'accès à la caméra.</span>
    </div>

    <!-- Guide d'utilisation -->
    <div id="user-guide">
        <div class="guide-item">
            <div class="color-dot dot-blue"></div>
            <span><strong>Main Gauche (Bleue) :</strong> Déplace le curseur avec l'index.</span>
        </div>
        <div class="guide-item" style="margin-top: 8px;">
            <div class="color-dot dot-red"></div>
            <span><strong>Main Droite (Rouge) :</strong> Pince (index + pouce) pour attraper et empiler les formes.</span>
        </div>
    </div>

    <!-- Caméra miniature -->
    <div class="camera-container">
        <video id="webcam" style="display:none;" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <!-- Canvas de simulation de la physique 2D -->
    <canvas id="physics-canvas"></canvas>

    <!-- Curseur Virtuel -->
    <div id="virtual-cursor" style="left: 50%; top: 50%;"></div>

    <script>
        const videoElement = document.getElementById('webcam');
        const cameraCanvas = document.getElementById('output_canvas');
        const cameraCtx = cameraCanvas.getContext('2d');
        const loadingDiv = document.getElementById('loading');
        const virtualCursor = document.getElementById('virtual-cursor');
        
        // Canvas physique
        const canvas = document.getElementById('physics-canvas');
        const ctx = canvas.getContext('2d');

        // Configuration de la taille du canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // État du curseur virtuel unique
        const cursor = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            targetX: window.innerWidth / 2,
            targetY: window.innerHeight / 2,
            active: false,   // Activé quand la main gauche est présente
            clicking: false  // Activé quand la main droite pince
        };

        // Paramètres de la physique réglés pour un empilement réaliste et stable
        const gravity = 0.35;        // Force de gravité vers le bas
        const airResistance = 0.992;  // Friction de l'air pour stabiliser
        const restitution = 0.15;    // Coefficient de rebond faible (amortit les chocs pour l'empilement)
        const friction = 0.95;       // Friction latérale importante pour éviter les glissements infinis

        // Liste des formes géométriques physiques
        const shapes = [];

        class Shape {
            constructor(type, x, y, options = {}) {
                this.type = type; // 'circle', 'square', 'rect'
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.color = options.color || '#fff';
                this.glow = options.glow || options.color;
                this.isDragged = false;
                this.isHovered = false;

                // Spécifiques aux types pour le rendu et les calculs physiques précis
                if (type === 'circle') {
                    this.radius = options.radius || 45;
                    this.mass = this.radius * 0.15;
                } else if (type === 'square') {
                    this.size = options.size || 80;
                    this.mass = this.size * 0.2;
                } else if (type === 'rect') {
                    this.width = options.width || 180;
                    this.height = options.height || 60;
                    this.mass = (this.width + this.height) * 0.15;
                }
                
                // Mémoire de position pour l'inertie lors du lancer
                this.lastX = x;
                this.lastY = y;
            }

            // Met à jour la position et la vélocité de la forme
            update() {
                if (this.isDragged) {
                    this.lastX = this.x;
                    this.lastY = this.y;
                    
                    // Suivi direct du curseur avec amortissement du drag
                    this.vx = (cursor.x - this.x) * 0.4;
                    this.vy = (cursor.y - this.y) * 0.4;
                    
                    this.x += this.vx;
                    this.y += this.vy;
                } else {
                    // Application de la pesanteur
                    this.vy += gravity;

                    // Application de la résistance de l'air
                    this.vx *= airResistance;
                    this.vy *= airResistance;

                    // Déplacement
                    this.x += this.vx;
                    this.y += this.vy;

                    // Résolution des collisions avec les parois de l'écran
                    this.handleBoundaryCollisions();
                }
            }

            // Rendu de la forme géométrique avec des effets néon
            draw() {
                ctx.save();
                ctx.shadowBlur = this.isHovered ? 25 : 12;
                ctx.shadowColor = this.glow;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = this.isHovered ? 4 : 2;
                ctx.fillStyle = this.color;

                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else if (this.type === 'square') {
                    ctx.beginPath();
                    ctx.rect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                    ctx.fill();
                    ctx.stroke();
                } else if (this.type === 'rect') {
                    ctx.beginPath();
                    ctx.rect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            }

            // Gère les rebonds et l'appui stable sur le sol / les murs
            handleBoundaryCollisions() {
                let r, w, h;
                if (this.type === 'circle') {
                    r = this.radius;
                    if (this.x - r < 0) { this.x = r; this.vx = -this.vx * restitution; }
                    if (this.x + r > canvas.width) { this.x = canvas.width - r; this.vx = -this.vx * restitution; }
                    if (this.y - r < 0) { this.y = r; this.vy = -this.vy * restitution; }
                    if (this.y + r > canvas.height) { 
                        this.y = canvas.height - r; 
                        this.vy = -this.vy * restitution; 
                        this.vx *= friction; // Friction au sol pour stopper les glissades
                    }
                } else if (this.type === 'square') {
                    r = this.size / 2;
                    if (this.x - r < 0) { this.x = r; this.vx = -this.vx * restitution; }
                    if (this.x + r > canvas.width) { this.x = canvas.width - r; this.vx = -this.vx * restitution; }
                    if (this.y - r < 0) { this.y = r; this.vy = -this.vy * restitution; }
                    if (this.y + r > canvas.height) { 
                        this.y = canvas.height - r; 
                        this.vy = -this.vy * restitution; 
                        this.vx *= friction; // Friction au sol pour stopper les glissades
                    }
                } else if (this.type === 'rect') {
                    w = this.width / 2;
                    h = this.height / 2;
                    if (this.x - w < 0) { this.x = w; this.vx = -this.vx * restitution; }
                    if (this.x + w > canvas.width) { this.x = canvas.width - w; this.vx = -this.vx * restitution; }
                    if (this.y - h < 0) { this.y = h; this.vy = -this.vy * restitution; }
                    if (this.y + h > canvas.height) { 
                        this.y = canvas.height - h; 
                        this.vy = -this.vy * restitution; 
                        this.vx *= friction; // Friction au sol pour stopper les glissades
                    }
                }
            }

            // Vérifie si un point (px, py) est à l'intérieur de la forme
            containsPoint(px, py) {
                if (this.type === 'circle') {
                    return Math.hypot(this.x - px, this.y - py) < this.radius;
                } else if (this.type === 'square') {
                    const half = this.size / 2;
                    return px >= this.x - half && px <= this.x + half &&
                           py >= this.y - half && py <= this.y + half;
                } else if (this.type === 'rect') {
                    const hw = this.width / 2;
                    const hh = this.height / 2;
                    return px >= this.x - hw && px <= this.x + hw &&
                           py >= this.y - hh && py <= this.y + hh;
                }
                return false;
            }

            // Récupère la boîte englobante pour des collisions AABB (Alignées sur les axes) stables
            getBounds() {
                if (this.type === 'circle') {
                    return {
                        minX: this.x - this.radius,
                        maxX: this.x + this.radius,
                        minY: this.y - this.radius,
                        maxY: this.y + this.radius,
                        width: this.radius * 2,
                        height: this.radius * 2
                    };
                } else if (this.type === 'square') {
                    const half = this.size / 2;
                    return {
                        minX: this.x - half,
                        maxX: this.x + half,
                        minY: this.y - half,
                        maxY: this.y + half,
                        width: this.size,
                        height: this.size
                    };
                } else if (this.type === 'rect') {
                    const hw = this.width / 2;
                    const hh = this.height / 2;
                    return {
                        minX: this.x - hw,
                        maxX: this.x + hw,
                        minY: this.y - hh,
                        maxY: this.y + hh,
                        width: this.width,
                        height: this.height
                    };
                }
            }
        }

        // --- GÉNÉRATION DES 6 FORMES REQUISES ---
        // 2 Rectangles longs (couleurs : Turquoise / Cyan et Violet)
        shapes.push(new Shape('rect', window.innerWidth * 0.25, window.innerHeight * 0.3, {
            width: 200, height: 45, color: 'rgba(0, 240, 255, 0.25)', glow: '#00f0ff'
        }));
        shapes.push(new Shape('rect', window.innerWidth * 0.75, window.innerHeight * 0.3, {
            width: 220, height: 45, color: 'rgba(180, 0, 255, 0.25)', glow: '#b400ff'
        }));

        // 2 Cercles (couleurs : Jaune Néon et Vert Émeraude)
        shapes.push(new Shape('circle', window.innerWidth * 0.40, window.innerHeight * 0.5, {
            radius: 40, color: 'rgba(255, 235, 0, 0.25)', glow: '#ffeb00'
        }));
        shapes.push(new Shape('circle', window.innerWidth * 0.60, window.innerHeight * 0.5, {
            radius: 45, color: 'rgba(0, 255, 120, 0.25)', glow: '#00ff78'
        }));

        // 2 Carrés (couleurs : Rouge Vif et Orange Feu)
        shapes.push(new Shape('square', window.innerWidth * 0.30, window.innerHeight * 0.7, {
            size: 70, color: 'rgba(255, 20, 50, 0.25)', glow: '#ff1432'
        }));
        shapes.push(new Shape('square', window.innerWidth * 0.70, window.innerHeight * 0.7, {
            size: 75, color: 'rgba(255, 110, 0, 0.25)', glow: '#ff6e00'
        }));


        // --- ENGiNE DE COLLISION ET EMPILEMENT ROBUSTE ---
        // Utilise un algorithme AABB/Distance combiné avec résolution immédiate de la pénétration (overlap)
        function resolveShapeCollisions() {
            for (let i = 0; i < shapes.length; i++) {
                for (let j = i + 1; j < shapes.length; j++) {
                    const s1 = shapes[i];
                    const s2 = shapes[j];

                    const b1 = s1.getBounds();
                    const b2 = s2.getBounds();

                    // 1. Test préliminaire d'intersection AABB
                    if (b1.maxX > b2.minX && b1.minX < b2.maxX && b1.maxY > b2.minY && b1.minY < b2.maxY) {
                        
                        // Calcul des recouvrements sur les axes
                        const overlapX = Math.min(b1.maxX - b2.minX, b2.maxX - b1.minX);
                        const overlapY = Math.min(b1.maxY - b2.minY, b2.maxY - b1.minY);

                        // Détermination de l'axe de collision (le plus petit recouvrement)
                        let nx = 0;
                        let ny = 0;
                        let penetration = 0;

                        if (overlapX < overlapY) {
                            nx = (s2.x > s1.x) ? 1 : -1;
                            penetration = overlapX;
                        } else {
                            ny = (s2.y > s1.y) ? 1 : -1;
                            penetration = overlapY;
                        }

                        // 2. Résolution de la pénétration (Correction géométrique immédiate)
                        // Évite que les objets ne s'enfoncent ou ne se traversent à l'empilement
                        if (penetration > 0) {
                            if (!s1.isDragged && !s2.isDragged) {
                                // On repousse proportionnellement les deux objets selon leur masse
                                const totalMass = s1.mass + s2.mass;
                                s1.x -= nx * penetration * (s2.mass / totalMass);
                                s1.y -= ny * penetration * (s2.mass / totalMass);
                                s2.x += nx * penetration * (s1.mass / totalMass);
                                s2.y += ny * penetration * (s1.mass / totalMass);

                                // 3. Résolution des vélocités (Rebond + Friction de glissement)
                                const rvx = s2.vx - s1.vx;
                                const rvy = s2.vy - s1.vy;
                                const velAlongNormal = rvx * nx + rvy * ny;

                                // On résout l'impact physique seulement s'ils bougent l'un vers l'autre
                                if (velAlongNormal < 0) {
                                    const impulseScalar = -(1 + restitution) * velAlongNormal / (1/s1.mass + 1/s2.mass);
                                    
                                    s1.vx -= (impulseScalar / s1.mass) * nx;
                                    s1.vy -= (impulseScalar / s1.mass) * ny;
                                    s2.vx += (impulseScalar / s2.mass) * nx;
                                    s2.vy += (impulseScalar / s2.mass) * ny;

                                    // Application d'une friction de contact pour rendre l'empilement stable
                                    // Freine les glissements latéraux lors des contacts verticaux
                                    if (Math.abs(ny) > 0.5) {
                                        s1.vx *= friction;
                                        s2.vx *= friction;
                                    }
                                }
                            } else if (s1.isDragged && !s2.isDragged) {
                                // s1 est tenu, s2 est repoussée
                                s2.x += nx * penetration;
                                s2.y += ny * penetration;
                                s2.vx = nx * 3;
                                s2.vy = ny * 3;
                            } else if (!s1.isDragged && s2.isDragged) {
                                // s2 est tenu, s1 est repoussée
                                s1.x -= nx * penetration;
                                s1.y -= ny * penetration;
                                s1.vx = -nx * 3;
                                s1.vy = -ny * 3;
                            }
                        }
                    }
                }
            }
        }


        // --- RETOUR DE L'ANALYSE DES MAINS (MEDIAPIPE HANDS) ---
        function onHandResults(results) {
            if (loadingDiv) {
                loadingDiv.style.opacity = '0';
                setTimeout(() => loadingDiv.remove(), 300);
            }

            // Dessin du squelette sur l'overlay caméra miniature
            cameraCtx.clearRect(0, 0, cameraCanvas.width, cameraCanvas.height);
            cameraCtx.drawImage(results.image, 0, 0, cameraCanvas.width, cameraCanvas.height);

            let rightHandFound = false;
            let leftHandFound = false;
            let rightHandPinching = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const classification = results.multiHandedness[i];
                    
                    // Avec l'effet miroir, la main droite physique s'affiche à droite de notre écran (label 'Right').
                    const isRightHand = classification.label === 'Right'; 

                    // Attribution de la couleur pour le squelette sur l'overlay caméra :
                    // Gauche ('Left') -> Bleue (mouvement)
                    // Droite ('Right') -> Rouge (action/pincement)
                    const handColor = isRightHand ? "#ff3366" : "#3399ff"; 

                    // Tracé du squelette de la main sur le canvas miniature
                    cameraCtx.strokeStyle = handColor; 
                    cameraCtx.lineWidth = 3;
                    const connections = [
                        [0, 1], [1, 2], [2, 3], [3, 4], [0, 5], [5, 6], [6, 7], [7, 8],
                        [5, 9], [9, 10], [10, 11], [11, 12], [9, 13], [13, 14], [14, 15], 
                        [15, 16], [13, 17], [17, 18], [18, 19], [19, 20], [0, 17]
                    ];
                    for (const connection of connections) {
                        const pt1 = landmarks[connection[0]];
                        const pt2 = landmarks[connection[1]];
                        cameraCtx.beginPath();
                        cameraCtx.moveTo(pt1.x * cameraCanvas.width, pt1.y * cameraCanvas.height);
                        cameraCtx.lineTo(pt2.x * cameraCanvas.width, pt2.y * cameraCanvas.height);
                        cameraCtx.stroke();
                    }

                    // --- TRAITEMENT GAUCHE (Mouvement du curseur virtuel) ---
                    if (!isRightHand) {
                        leftHandFound = true;
                        const indexTip = landmarks[8];

                        const rawX = 1 - indexTip.x; 
                        const rawY = indexTip.y;

                        // Boîte de sensibilité pour piloter aisément tout l'écran
                        const minX = 0.22; 
                        const maxX = 0.78;
                        const minY = 0.25;
                        const maxY = 0.70;

                        let screenX = ((rawX - minX) / (maxX - minX)) * window.innerWidth;
                        let screenY = ((rawY - minY) / (maxY - minY)) * window.innerHeight;

                        const margin = 15;
                        cursor.targetX = Math.max(margin, Math.min(screenX, window.innerWidth - margin));
                        cursor.targetY = Math.max(margin, Math.min(screenY, window.innerHeight - margin));
                    } 
                    // --- TRAITEMENT DROITE (Pincement / Clic physique) ---
                    else {
                        rightHandFound = true;
                        const thumbTip = landmarks[4];
                        const indexTip = landmarks[8];

                        const pinchDistance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                        if (pinchDistance < 0.050) {
                            rightHandPinching = true;
                        }
                    }
                }
            }

            // Gestion de l'état d'activité du curseur
            if (leftHandFound) {
                cursor.active = true;
                virtualCursor.classList.add('active');
            } else {
                cursor.active = false;
                virtualCursor.classList.remove('active');
            }

            // Gestion de l'état de clic lié à la main droite
            if (rightHandFound && rightHandPinching) {
                cursor.clicking = true;
                virtualCursor.classList.add('clicking');
            } else {
                cursor.clicking = false;
                virtualCursor.classList.remove('clicking');
                releaseAllShapes(); // Relâche instantanément si le pincement s'arrête
            }

            // --- RECHERCHE DU SURVOL DES FORMES ---
            let hoveredShape = null;
            
            // On cherche du haut vers le bas (les dernières formes du tableau s'affichent par-dessus)
            for (let i = shapes.length - 1; i >= 0; i--) {
                const shape = shapes[i];
                if (shape.containsPoint(cursor.x, cursor.y)) {
                    hoveredShape = shape;
                    break;
                }
            }

            // Reset des survols
            shapes.forEach(s => s.isHovered = false);
            if (hoveredShape && !isAnyShapeDragged()) {
                hoveredShape.isHovered = true;
            }

            // --- ATTRAPER UNE FORME GÉOMÉTRIQUE ---
            if (cursor.clicking && hoveredShape && !isAnyShapeDragged()) {
                hoveredShape.isDragged = true;
            }
        }

        // Vérifie si une des formes est actuellement déplacée par le joueur
        function isAnyShapeDragged() {
            return shapes.some(s => s.isDragged);
        }

        // Relâche toutes les formes attrapées en leur appliquant un vecteur d'inertie (effet de jet)
        function releaseAllShapes() {
            shapes.forEach(shape => {
                if (shape.isDragged) {
                    shape.isDragged = false;
                    
                    // Calcul de la vitesse à l'instant du lancer
                    shape.vx = (shape.x - shape.lastX) * 0.75;
                    shape.vy = (shape.y - shape.lastY) * 0.75;

                    // Sécurité : vitesse de jet maximum autorisée
                    const maxReleaseSpeed = 18;
                    const currentSpeed = Math.hypot(shape.vx, shape.vy);
                    if (currentSpeed > maxReleaseSpeed) {
                        shape.vx = (shape.vx / currentSpeed) * maxReleaseSpeed;
                        shape.vy = (shape.vy / currentSpeed) * maxReleaseSpeed;
                    }
                }
            });
        }


        // --- RENDU ET BOUCLE PHYSIQUE (60 FPS) ---
        function updateGame() {
            // Effacement total de l'écran pour la nouvelle frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Amortissement fluide (LERP) de la position du curseur
            cursor.x += (cursor.targetX - cursor.x) * 0.22;
            cursor.y += (cursor.targetY - cursor.y) * 0.22;

            // Alignement physique de la bulle curseur dans le DOM
            virtualCursor.style.left = `${cursor.x}px`;
            virtualCursor.style.top = `${cursor.y}px`;

            // 1. Mise à jour de la physique de chaque forme
            shapes.forEach(shape => shape.update());

            // 2. Traitement et résolution des collisions et empilements stables
            resolveShapeCollisions();

            // 3. Dessin des formes à l'écran
            shapes.forEach(shape => shape.draw());

            requestAnimationFrame(updateGame);
        }

        // Démarrage immédiat de la boucle d'animation
        updateGame();


        // --- DÉMARRAGE DU TRACKING MANUEL (MEDIAPIPE) ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2, 
            modelComplexity: 1,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.65
        });
        hands.onResults(onHandResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start().catch(err => {
            console.error(err);
            loadingDiv.innerText = "Erreur : Impossible d'accéder à la webcam.";
            loadingDiv.style.color = "#ff4444";
        });
    </script>
</body>
</html>
